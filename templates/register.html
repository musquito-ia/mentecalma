{% extends "base.html" %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-header">
    <div style="font-size:52px;margin-bottom:10px">🌱</div>
    <div class="auth-logo">Criar minha conta</div>
    <div class="auth-sub">Comece sua jornada de 30 dias</div>
  </div>

  <div class="card" style="padding:28px 24px">
    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Seu nome *</label>
        <input type="text" name="name" placeholder="Ex: Ana Paula" required/>
      </div>
      <div class="form-group">
        <label>E-mail *</label>
        <input type="email" name="email" placeholder="seu@email.com" required/>
      </div>
      <div class="form-group">
        <label>Senha * <span style="font-size:12px;color:#999">(mín. 6 caracteres)</span></label>
        <input type="password" name="password" placeholder="Crie uma senha" required/>
      </div>
      <div class="form-group">
        <label>Nome do seu filho(a) <span style="font-size:12px;color:#999">(opcional)</span></label>
        <input type="text" name="child_name" placeholder="Ex: Lucas"/>
      </div>
      <button type="submit" class="btn-primary">Começar minha jornada 🚀</button>
    </form>
    <div class="auth-footer" style="margin-top:20px">
      Já tem conta? <a href="{{ url_for('login') }}">Entrar</a>
    </div>
  </div>
</div>
{% endblock %}
